name: Test Docusaurus docs build

on:
  pull_request:
    branches: [ main ]
    paths:
      # Top-level docs that feed into the website
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'test/README.md'
      - 'doc/annotation_format_mapping.md'
      - 'doc/INN_antibody_schema.json'
      # Anything under the Docusaurus site
      - 'website/**'
  workflow_dispatch: {}

jobs:
  build-docs:
    name: Build docs site (no deploy)
    runs-on: ubuntu-latest

    # Not deploying, so we only need read access.
    permissions:
      contents: read

    steps:
      # 1) Check out the repository at the PR's merge commit
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) Set up Node.js with caching for faster installs
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            website/package-lock.json
            website/package.json

      # 3) Install website dependencies (includes Docusaurus + plugins)
      - name: Install dependencies
        run: npm ci
        working-directory: website

      # 4) Build the Docusaurus site
      #    - This will also run the "sync-docs" step that's been wired into the "build" script in website/package.json
      - name: Build docs
        run: npm run build
        working-directory: website