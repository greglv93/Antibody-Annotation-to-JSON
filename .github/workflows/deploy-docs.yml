name: Deploy Docusaurus docs to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      # Top-level docs that feed into the website
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'test/README.md'
      - 'doc/annotation_format_mapping.md'
      - 'doc/INN_antibody_schema.json'
      # Anything under the Docusaurus site
      - 'website/**'
      # This workflow file
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest

    steps:
      # 1) Check out the repository at the PR's merge commit
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) Set up Node.js with caching for faster installs
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            website/package-lock.json
            website/package.json

      # 3) Install website dependencies (includes Docusaurus + plugins)
      - name: Install dependencies
        run: npm ci
        working-directory: website

      # 4) Build the Docusaurus site
      #    - This will also run the "sync-docs" step that's been wired into the "build" script in website/package.json
      - name: Build docs
        run: npm run build
        working-directory: website

      # 5) Uploads the website build as a Pages artifact, which the 'deploy' job can then use
      #     - the build directory is never committed, which reduces repo bloat and commit history clutter
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
